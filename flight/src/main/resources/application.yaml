spring:
  application:
    name: flight-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:skybusdb}?currentSchema=skybus_flight_schema
    username: ${DB_USER:skybus}
    password: ${DB_PASS:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: FlightServicePool
      maximum-pool-size: ${DB_POOL_MAX:15}
      minimum-idle: 2
      auto-commit: false
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: skybus_flight_schema
        format_sql: false

  flyway:
    enabled: true
    schemas: skybus_flight_schema
    locations: classpath:db/migration
    validate-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8082}
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

logging:
  level:
    root: WARN
    com.skybus.flight: INFO