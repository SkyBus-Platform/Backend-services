spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/skybusdb?currentSchema=skybus_flight_schema
    username: skybus
    password: 1234
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    url: jdbc:postgresql://localhost:5432/skybusdb
    user: skybus
    password: 1234
    schemas: skybus_flight_schema
    locations: classpath:db/migration

server:
  port: 8082
  error:
    include-message: always
    include-stacktrace: on-param

logging:
  level:
    root: INFO
    com.skybus.flight: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.flywaydb: DEBUG