spring:
  application:
    name: notification-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # RabbitMQ
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 10           # process up to 10 messages at once per consumer

  # Mail — values overridden per profile
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  # Thymeleaf — HTML email templates
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: true              # disable in dev profile

  jackson:
    deserialization:
      fail-on-unknown-properties: false   # tolerate extra fields in events
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8084}

# Email sender identity
notification:
  mail:
    from: ${MAIL_FROM:noreply@skybus.com}
    from-name: ${MAIL_FROM_NAME:SkyBus Notifications}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

logging:
  level:
    root: WARN
    com.skybus.notification: INFO