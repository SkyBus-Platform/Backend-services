spring:
  application:
    name: booking-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:skybusdb}?currentSchema=skybus_booking_schema
    username: ${DB_USER:skybus}
    password: ${DB_PASS:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: BookingServicePool
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: 2
      auto-commit: false
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: skybus_booking_schema
        format_sql: false

  flyway:
    enabled: true
    schemas: skybus_booking_schema
    locations: classpath:db/migration
    validate-on-migrate: true

  # RabbitMQ
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  cloud:
    openfeign:
      client:
        config:
          flight-service:
            connect-timeout: 3000
            read-timeout: 5000
      circuitbreaker:
        enabled: true

server:
  port: ${SERVER_PORT:8083}
  error:
    include-message: never
    include-stacktrace: never

# Flight-service URL for Feign client
services:
  flight:
    url: ${FLIGHT_SERVICE_URL:http://localhost:8082}

# Resilience4j circuit breaker
resilience4j:
  circuitbreaker:
    instances:
      flight-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        register-health-indicator: true
  timelimiter:
    instances:
      flight-service:
        timeout-duration: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    circuitbreakers:
      enabled: true

logging:
  level:
    root: WARN
    com.skybus.booking: INFO